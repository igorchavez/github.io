<meta name="apple-mobile-web-app-capable" content="yes">

<title>Sentinel Field</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#eaeaea;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;display:flex;align-items:center;justify-content:center}
.box{background:#fff;border-radius:16px;padding:32px 24px;width:min(340px,90vw);text-align:center;box-shadow:0 2px 20px rgba(0,0,0,0.08)}
.icon{font-size:52px;margin-bottom:12px}
.title{font-size:20px;font-weight:700;color:#111;margin-bottom:6px;letter-spacing:-.02em}
.sub{font-size:13px;color:#888;margin-bottom:24px}
input{width:100%;background:#f2f2f2;border:0.5px solid rgba(0,0,0,0.08);border-radius:8px;padding:12px 14px;font-size:16px;font-family:inherit;color:#111;outline:none;margin-bottom:12px;-webkit-appearance:none;text-align:center;letter-spacing:.1em}
input:focus{border-color:#1a6fa8}
button{width:100%;padding:13px;background:#1a6fa8;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
button:active{opacity:.85}
.err{font-size:13px;color:#c0392b;margin-top:10px;min-height:18px}
.hint{font-size:11px;color:#aaa;margin-top:12px}
</style>
</head>
<body>
<div class="box">
  <div class="icon">🔧</div>
  <div class="title">Sentinel Field</div>
  <div class="sub">Introduce la contraseña para acceder</div>
  <input type="password" id="pwd" placeholder="Contraseña" autocomplete="current-password"
    onkeydown="if(event.key==='Enter')unlock()">
  <button onclick="unlock()">Acceder</button>
  <div class="err" id="err"></div>
  <div class="hint">Acceso restringido — uso interno</div>
</div>

function b64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0));}

async function unlock(){
  const pwd = document.getElementById('pwd').value;
  if(!pwd){document.getElementById('err').textContent='Introduce la contraseña';return;}
  document.querySelector('button').textContent='Descifrando...';
  document.getElementById('err').textContent='';
  try{
    const enc = new TextEncoder();
    const km = await crypto.subtle.importKey('raw',enc.encode(pwd),'PBKDF2',false,['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      {name:'PBKDF2',salt:b64(SALT),iterations:600000,hash:'SHA-256'},
      km,{name:'AES-GCM',length:256},false,['decrypt']
    );
    const plain = await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(IV)},key,b64(CT));
    const html = new TextDecoder().decode(plain);
    document.open();document.write(html);document.close();
  }catch(e){
    document.getElementById('err').textContent='Contraseña incorrecta';
    document.querySelector('button').textContent='Acceder';
    document.getElementById('pwd').value='';
    document.getElementById('pwd').focus();
  }
}

// Foco automático
window.addEventListener('load',()=>document.getElementById('pwd').focus());
</script>
