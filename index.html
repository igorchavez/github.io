<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Sentinel Field">
<meta name="theme-color" content="#f0f0f0">
<title>Sentinel Field</title>
<style>
:root{
  --bg:#eaeaea;--surface:#fff;--surface2:#f2f2f2;--surface3:#e8e8e8;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);
  --text:#111;--text2:#666;--text3:#aaa;
  --accent:#1a6fa8;--accent-dim:rgba(26,111,168,0.10);
  --red:#c0392b;--red-dim:rgba(192,57,43,0.10);
  --green:#27ae60;--green-dim:rgba(39,174,96,0.10);
  --amber:#e67e22;--amber-dim:rgba(230,126,34,0.10);
  --radius:10px;--radius-sm:6px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:15px}
body{display:flex;flex-direction:column}

/* LOCK */
#lock{position:fixed;inset:0;background:var(--surface);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:16px}
#lock.hidden{display:none}
.lock-icon{font-size:52px}
.lock-title{font-size:22px;font-weight:700;letter-spacing:-0.02em}
.lock-sub{font-size:14px;color:var(--text2);text-align:center;line-height:1.4}
.pin-dots{display:flex;gap:14px;margin:4px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);transition:background .15s}
.pin-dot.on{background:var(--accent);border-color:var(--accent)}
.pin-err{font-size:13px;color:var(--red);min-height:18px;text-align:center}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:252px}
.pin-btn{height:66px;background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--radius);font-size:24px;font-weight:300;color:var(--text);cursor:pointer;font-family:inherit}
.pin-btn:active{background:var(--border2)}
.pin-btn.sm{font-size:16px;color:var(--text2)}
.btn-fid{width:252px;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;display:none}
.btn-fid:active{opacity:.85}
.lock-hint{font-size:12px;color:var(--text3);text-align:center}

/* LAYOUT */
.offline-bar{display:none;background:var(--red-dim);border-bottom:0.5px solid var(--red);padding:5px 16px;font-size:12px;color:var(--red);text-align:center;flex-shrink:0}
.offline-bar.show{display:block}
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.screen{display:none;padding:0 0 80px}
.screen.active{display:block}
.s-head{display:flex;justify-content:space-between;align-items:center;padding:16px 16px 8px}
.s-title{font-size:20px;font-weight:700;letter-spacing:-0.02em}
.nav{display:flex;background:var(--surface);border-top:0.5px solid var(--border);flex-shrink:0;padding-bottom:var(--safe-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;border:none;background:none;color:var(--text3);font-size:10px;font-family:inherit;cursor:pointer;letter-spacing:.02em}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.nav-btn.active{color:var(--accent)}

/* CARDS */
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;cursor:pointer}
.card:active{border-color:var(--accent)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.card-id{font-size:15px;font-weight:700}
.card-sub{font-size:12px;color:var(--text2);margin-top:2px}
.card-foot{font-size:12px;color:var(--text3);margin-top:6px}
.badge{display:inline-flex;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600}
.b-blue{background:var(--accent-dim);color:var(--accent)}
.b-red{background:var(--red-dim);color:var(--red)}
.b-green{background:var(--green-dim);color:var(--green)}
.b-amber{background:var(--amber-dim);color:var(--amber)}
.b-gray{background:var(--surface2);color:var(--text2)}
.group-label{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:12px 16px 6px;border-bottom:0.5px solid var(--border);margin-bottom:2px}
.group-label:first-child{padding-top:4px}

/* FORM */
.fl{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;margin-top:14px;letter-spacing:.04em;text-transform:uppercase}
.fi{width:100%;background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-size:15px;font-family:inherit;outline:none;-webkit-appearance:none}
.fi:focus{border-color:var(--accent)}
select.fi{cursor:pointer}
textarea.fi{resize:vertical;min-height:72px;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sub{border-left:2px solid var(--accent-dim);padding:10px 0 4px 14px;margin:10px 0}
.sub-title{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.chip{padding:6px 12px;border-radius:20px;border:0.5px solid var(--border2);font-size:13px;background:var(--surface);color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}

/* MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:50;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ov.open{display:block}
.modal{background:var(--bg);border-radius:var(--radius) var(--radius) 0 0;padding:20px 16px;padding-bottom:calc(32px + var(--safe-bottom));margin-top:40px;min-height:calc(100vh - 40px)}
.mhandle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mtitle{font-size:18px;font-weight:700;letter-spacing:-.02em}
.mclose{width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border:none;border-radius:50%;color:var(--text2);cursor:pointer}
.mclose svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}

/* PREVIEW */
.preview{background:var(--surface);border:0.5px solid var(--accent);border-radius:var(--radius-sm);padding:12px;margin-top:8px}
.preview-title{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
.preview-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:0.5px solid var(--border);font-size:13px}
.preview-row:last-child{border-bottom:none}
.preview-k{color:var(--text2)}
.preview-v{text-align:right;font-weight:500}
.preview-confirm{display:flex;gap:8px;margin-top:10px}
.btn-confirm{flex:1;padding:10px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border:none}
.btn-si{background:var(--green-dim);color:var(--green)}
.btn-no{background:var(--red-dim);color:var(--red)}

/* HISTORIAL */
.hist-box{background:var(--surface2);border-radius:var(--radius-sm);padding:10px;margin-top:8px}
.hist-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
.hist-item{padding:6px 0;border-bottom:0.5px solid var(--border);font-size:13px;cursor:pointer}
.hist-item:last-child{border-bottom:none}
.hist-date{font-size:11px;color:var(--text3)}
.hist-desc{color:var(--text);line-height:1.4}

/* NOTA PRIVADA */
.priv-box{background:rgba(230,126,34,0.07);border:0.5px solid rgba(230,126,34,0.3);border-radius:var(--radius-sm);padding:8px 10px;margin-top:8px}
.priv-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--amber);margin-bottom:3px}

/* BOTONES */
.btn{width:100%;padding:13px;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:10px;border:none}
.btn:active{opacity:.8}
.btn-p{background:var(--accent);color:#fff}
.btn-g{background:var(--surface);color:var(--text);border:0.5px solid var(--border2)}
.btn-d{background:var(--red-dim);color:var(--red);border:0.5px solid rgba(192,57,43,.2)}
.btn-new{display:flex;align-items:center;gap:5px;padding:7px 13px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-new svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}
.btn-icon{display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-sm);font-size:13px;color:var(--text2);cursor:pointer;font-family:inherit}
.btn-icon svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}

/* DETAIL */
.dr{display:flex;justify-content:space-between;padding:9px 0;border-bottom:0.5px solid var(--border);font-size:13px}
.dr:last-child{border-bottom:none}
.dk{color:var(--text2);flex-shrink:0;margin-right:12px}
.dv{text-align:right;font-weight:500;word-break:break-all}
.sep{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin:16px 0 8px;padding-bottom:6px;border-bottom:0.5px solid var(--border)}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px;margin-bottom:12px}
.stat-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px}
.stat-num{font-size:28px;font-weight:700;letter-spacing:-.03em;line-height:1}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:4px}

/* FILTROS */
.filter-bar{padding:8px 16px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:0.5px solid var(--border);background:var(--surface)}
.filter-bar .fi{font-size:13px;padding:7px 10px}
.search-box{display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:0.5px solid var(--border);background:var(--surface)}
.search-box input{flex:1;background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;color:var(--text);font-size:14px;font-family:inherit;outline:none}
.search-box input:focus{border-color:var(--accent)}

/* FOTOS */
.foto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.fthumb{width:100%;aspect-ratio:1;object-fit:cover;border-radius:var(--radius-sm);border:0.5px solid var(--border);cursor:pointer}
.fadd{width:100%;aspect-ratio:1;border-radius:var(--radius-sm);border:1px dashed var(--border2);background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;color:var(--text3);font-size:11px}
.fadd svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.5}
.fviewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:100;flex-direction:column;align-items:center;justify-content:center}
.fviewer.open{display:flex}
.fviewer img{max-width:100%;max-height:82vh;object-fit:contain;border-radius:4px}
.fv-close{position:absolute;top:16px;right:16px;width:36px;height:36px;background:rgba(255,255,255,.15);border:none;border-radius:50%;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.fv-del{position:absolute;bottom:32px;background:var(--red);color:#fff;border:none;padding:10px 24px;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}

.empty{text-align:center;padding:48px 16px;color:var(--text3)}
.empty svg{width:40px;height:40px;stroke:currentColor;fill:none;stroke-width:1;margin-bottom:12px;opacity:.4}
.empty p{font-size:14px;line-height:1.5}
.sync-row{display:flex;align-items:center;gap:8px;padding:10px 16px;font-size:13px;color:var(--text2)}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.sdot.off{background:var(--red)}
</style>
</head>
<body>

<!-- LOCK -->
<div id="lock">
  <div class="lock-icon">🔧</div>
  <div class="lock-title">Sentinel Field</div>
  <div class="lock-sub" id="lock-sub">Introduce tu PIN</div>
  <div class="pin-dots">
    <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
  </div>
  <div class="pin-err" id="pin-err"></div>
  <div class="pin-grid">
    <button class="pin-btn" onclick="pk('1')">1</button>
    <button class="pin-btn" onclick="pk('2')">2</button>
    <button class="pin-btn" onclick="pk('3')">3</button>
    <button class="pin-btn" onclick="pk('4')">4</button>
    <button class="pin-btn" onclick="pk('5')">5</button>
    <button class="pin-btn" onclick="pk('6')">6</button>
    <button class="pin-btn" onclick="pk('7')">7</button>
    <button class="pin-btn" onclick="pk('8')">8</button>
    <button class="pin-btn" onclick="pk('9')">9</button>
    <button class="pin-btn sm"></button>
    <button class="pin-btn" onclick="pk('0')">0</button>
    <button class="pin-btn sm" onclick="pdel()">⌫</button>
  </div>
  <button class="btn-fid" id="btn-fid" onclick="tryFID()">Face ID / Touch ID</button>
  <div class="lock-hint" id="lock-hint"></div>
</div>

<div class="offline-bar" id="offline-bar">Sin conexión — datos guardados localmente</div>

<div class="main" id="main">
  <!-- MÁQUINAS -->
  <div class="screen active" id="screen-maquinas">
    <div class="s-head">
      <span class="s-title">Máquinas</span>
      <button class="btn-new" onclick="abrirMaq()">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nueva
      </button>
    </div>
    <div class="filter-bar">
      <select class="fi" id="fm-cliente" onchange="renderMaquinas()" style="flex:1">
        <option value="">Todos los clientes</option>
      </select>
      <select class="fi" id="fm-tipo" onchange="renderMaquinas()" style="flex:1">
        <option value="">Todos los tipos</option>
        <option>Cabina pintura</option><option>Elevador</option><option>Compresor</option>
        <option>Soldadura</option><option>Secador</option><option>Otro</option>
      </select>
    </div>
    <div id="lista-maquinas" style="padding:8px 16px 0"></div>
  </div>

  <!-- PARTES -->
  <div class="screen" id="screen-partes">
    <div class="s-head">
      <span class="s-title">Partes</span>
      <button class="btn-new" onclick="abrirParte()">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nuevo
      </button>
    </div>
    <div class="filter-bar">
      <select class="fi" id="fp-cliente" onchange="renderPartes()" style="flex:1 1 120px">
        <option value="">Todos clientes</option>
      </select>
      <input type="date" class="fi" id="fp-desde" onchange="renderPartes()" style="flex:1 1 100px">
      <input type="date" class="fi" id="fp-hasta" onchange="renderPartes()" style="flex:1 1 100px">
      <button class="btn-icon" onclick="limpiarFiltros()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="search-box">
      <input type="search" id="fp-texto" placeholder="Buscar en partes..." oninput="renderPartes()">
    </div>
    <div id="lista-partes" style="padding:8px 16px 0"></div>
  </div>

  <!-- RESUMEN -->
  <div class="screen" id="screen-resumen">
    <div class="s-head"><span class="s-title">Resumen</span></div>
    <div id="resumen-content"></div>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showTab('maquinas',this)">
    <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>Máquinas
  </button>
  <button class="nav-btn" onclick="showTab('partes',this)">
    <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>Partes
  </button>
  <button class="nav-btn" onclick="showTab('resumen',this)">
    <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Resumen
  </button>
</nav>

<!-- MODAL NUEVO PARTE -->
<div class="ov" id="ov-parte"><div class="modal">
  <div class="mhandle"></div>
  <div class="mhead">
    <span class="mtitle">Nuevo parte</span>
    <button class="mclose" onclick="cerrar('ov-parte')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <label class="fl">1 — Cliente</label>
  <select class="fi" id="p-cliente" onchange="onClienteChange()">
    <option value="">— seleccionar —</option>
  </select>
  <div id="p-bloque-maq" style="display:none">
    <label class="fl">2 — Máquina</label>
    <select class="fi" id="p-maquina" onchange="onMaquinaChange()">
      <option value="">— seleccionar —</option>
    </select>
    <div id="p-maq-preview" style="display:none">
      <div class="preview">
        <div class="preview-title">Vista previa — ¿es esta la máquina?</div>
        <div id="p-maq-preview-body"></div>
        <div class="preview-confirm">
          <button class="btn-confirm btn-si" onclick="confirmarMaquina(true)">✓ Sí, es esta</button>
          <button class="btn-confirm btn-no" onclick="confirmarMaquina(false)">✗ No, cambiar</button>
        </div>
      </div>
    </div>
  </div>
  <div id="p-bloque-resto" style="display:none">
    <label class="fl">3 — Fecha y horario</label>
    <input class="fi" id="p-fecha" type="date">
    <div class="row2" style="margin-top:8px">
      <div><label class="fl">Hora inicio</label><input class="fi" id="p-hinicio" type="time"></div>
      <div><label class="fl">Hora fin</label><input class="fi" id="p-hfin" type="time"></div>
    </div>
    <label class="fl">4 — Tipo</label>
    <div class="chip-row" id="chips-ptipo">
      <button class="chip on" onclick="selChip(this,'ptipo','Correctivo')">Correctivo</button>
      <button class="chip" onclick="selChip(this,'ptipo','Preventivo')">Preventivo</button>
      <button class="chip" onclick="selChip(this,'ptipo','Revisión')">Revisión</button>
      <button class="chip" onclick="selChip(this,'ptipo','Inspección')">Inspección</button>
    </div>
    <label class="fl">5 — Componente</label>
    <div class="chip-row" id="chips-comp">
      <button class="chip on" onclick="selChip(this,'comp','Motor/Turbina')">Motor/Turbina</button>
      <button class="chip" onclick="selChip(this,'comp','Quemador')">Quemador</button>
      <button class="chip" onclick="selChip(this,'comp','Filtros')">Filtros</button>
      <button class="chip" onclick="selChip(this,'comp','Eléctrico')">Eléctrico</button>
      <button class="chip" onclick="selChip(this,'comp','Hidráulico')">Hidráulico</button>
      <button class="chip" onclick="selChip(this,'comp','Neumático')">Neumático</button>
      <button class="chip" onclick="selChip(this,'comp','Iluminación')">Iluminación</button>
      <button class="chip" onclick="selChip(this,'comp','Otro')">Otro</button>
    </div>
    <div id="p-comp-preview" style="display:none">
      <div class="preview" style="border-color:var(--amber)">
        <div class="preview-title" style="color:var(--amber)">Datos del componente en BD</div>
        <div id="p-comp-preview-body"></div>
        <div class="preview-confirm">
          <button class="btn-confirm btn-si" onclick="document.getElementById('p-comp-preview').style.display='none'">✓ Confirmado</button>
        </div>
      </div>
    </div>
    <div id="p-hist-box" style="display:none">
      <div class="hist-box">
        <div class="hist-title">Últimas intervenciones en esta máquina</div>
        <div id="p-hist-body"></div>
      </div>
    </div>
    <label class="fl">6 — Descripción del trabajo</label>
    <textarea class="fi" id="p-desc" placeholder="qué se hizo, qué se encontró..." style="min-height:90px"></textarea>
    <label class="fl">7 — Materiales / referencias (para factura)</label>

let pinBuf='',pinSetup=false,pinFirst=null;
let maqConfirmada=false;

// ═══ PIN / FACE ID ════════════════════════════════════════════
function initAuth(){
  const stored=localStorage.getItem('sf_pin');
  if(!stored){
    pinSetup=true;
    document.getElementById('lock-sub').textContent='Primera vez: crea tu PIN de 4 dígitos';
    document.getElementById('lock-hint').textContent='Elige un PIN que recuerdes';
  } else {
    const cred=localStorage.getItem('sf_cred');
    if(cred&&window.PublicKeyCredential){
      document.getElementById('btn-fid').style.display='block';
      document.getElementById('lock-sub').textContent='Usa Face ID o introduce tu PIN';
      setTimeout(tryFID,400);
    }
  }
}
function pk(n){
  if(pinBuf.length>=4)return;
  pinBuf+=n;updDots();
  if(pinBuf.length===4)setTimeout(checkPin,150);
}
function pdel(){pinBuf=pinBuf.slice(0,-1);updDots();}
function updDots(){for(let i=0;i<4;i++)document.getElementById('pd'+i).classList.toggle('on',i<pinBuf.length);}
function showPinErr(msg){
  document.getElementById('pin-err').textContent=msg;
  pinBuf='';updDots();
  setTimeout(()=>document.getElementById('pin-err').textContent='',1800);
}
function checkPin(){
  const stored=localStorage.getItem('sf_pin');
  if(pinSetup){
    if(!pinFirst){
      pinFirst=pinBuf;pinBuf='';updDots();
      document.getElementById('lock-sub').textContent='Repite el PIN para confirmar';
      return;
    }
    if(pinBuf===pinFirst){
      localStorage.setItem('sf_pin',pinBuf);
      pinBuf='';pinSetup=false;pinFirst=null;
      unlock();
      setTimeout(ofrecerFID,600);
    } else {
      showPinErr('Los PINs no coinciden, inténtalo de nuevo');
      pinFirst=null;
      document.getElementById('lock-sub').textContent='Primera vez: crea tu PIN de 4 dígitos';
    }
    return;
  }
  if(pinBuf===stored) unlock();
  else showPinErr('PIN incorrecto');
}
async function tryFID(){
  if(!window.PublicKeyCredential)return;
  const b64=localStorage.getItem('sf_cred');
  if(!b64)return;
  try{
    const id=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
    const a=await navigator.credentials.get({publicKey:{
      challenge:crypto.getRandomValues(new Uint8Array(32)),
      allowCredentials:[{type:'public-key',id}],
      userVerification:'required',
      timeout:30000
    }});
    if(a)unlock();
  }catch(e){
    // Face ID fallido o cancelado — usuario puede usar PIN
    document.getElementById('lock-sub').textContent='Introduce tu PIN';
  }
}
async function ofrecerFID(){
  if(!window.PublicKeyCredential)return;
  const ok=confirm('¿Activar Face ID / Touch ID para acceder automáticamente la próxima vez?');
  if(!ok)return;
  try{
    const c=await navigator.credentials.create({publicKey:{
      challenge:crypto.getRandomValues(new Uint8Array(32)),
      rp:{name:'Sentinel Field',id:location.hostname},
      user:{id:new Uint8Array(16),name:'tecnico',displayName:'Técnico'},
      pubKeyCredParams:[{alg:-7,type:'public-key'}],
      authenticatorSelection:{userVerification:'required'},
      timeout:30000
    }});
    localStorage.setItem('sf_cred',btoa(String.fromCharCode(...new Uint8Array(c.rawId))));
    document.getElementById('lock-hint').textContent='Face ID activado ✓';
  }catch(e){console.log('FID no registrado:',e.message);}
}
function unlock(){
  document.getElementById('lock').classList.add('hidden');
  initDB().then(cargar);
}

// ═══ INDEXEDDB ════════════════════════════════════════════════
function initDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open('SentinelField',5);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      ['clientes','sedes','maquinas','partes'].forEach(s=>{
        if(!db.objectStoreNames.contains(s))db.createObjectStore(s,{keyPath:'id'});
      });
      if(!db.objectStoreNames.contains('fotos'))db.createObjectStore('fotos',{autoIncrement:true,keyPath:'fid'});
    };
    req.onsuccess=e=>{DB=e.target.result;res();};
    req.onerror=()=>rej(req.error);
  });
}
const dbAll=s=>new Promise((r,j)=>{const q=DB.transaction(s,'readonly').objectStore(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error);});
const dbPut=(s,o)=>new Promise((r,j)=>{const q=DB.transaction(s,'readwrite').objectStore(s).put(o);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error);});
const dbDel=(s,k)=>new Promise((r,j)=>{const q=DB.transaction(s,'readwrite').objectStore(s).delete(k);q.onsuccess=()=>r();q.onerror=()=>j(q.error);});
const dbWhere=(s,f,v)=>dbAll(s).then(a=>a.filter(r=>r[f]===v));

async function cargar(){
  [clientes,sedes,maquinas,partes]=await Promise.all([dbAll('clientes'),dbAll('sedes'),dbAll('maquinas'),dbAll('partes')]);
  if(clientes.length===0)await importarHVT();
  else{poblarFiltros();renderAll();}
}

function showTab(tab,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));

  if(tab==='resumen')renderResumen();
}

function selChip(btn,key,val){
  chips[key]=val;
  btn.closest('.chip-row').querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');
  if(key==='mtipo')document.getElementById('extra-cabina').style.display=val==='Cabina pintura'?'block':'none';
  if(key==='comp')mostrarCompPreview(val);
}

// ═══ FILTROS ══════════════════════════════════════════════════
function poblarFiltros(){
  ['fm-cliente','fp-cliente','m-cliente'].forEach(id=>{
    const sel=document.getElementById(id);if(!sel)return;
    const cur=sel.value;
    sel.innerHTML=id.startsWith('f')?'<option value="">Todos los clientes</option>':'<option value="">— seleccionar —</option>';
    clientes.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.nombre;sel.appendChild(o);});
    sel.value=cur;
  });
}
function poblarSedes(){
  const cliId=document.getElementById('m-cliente').value;
  const sel=document.getElementById('m-sede');
  sel.innerHTML='<option value="">— seleccionar —</option>';
  sedes.filter(s=>s.clienteId===cliId).forEach(s=>{const o=document.createElement('option');o.value=s.id;o.textContent=s.nombre;sel.appendChild(o);});
}

// ═══ NUEVO PARTE ══════════════════════════════════════════════
function abrirParte(maqId){
  maqConfirmada=false;
  const pCli=document.getElementById('p-cliente');
  pCli.innerHTML='<option value="">— seleccionar —</option>';
  clientes.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.nombre;pCli.appendChild(o);});
  document.getElementById('p-bloque-maq').style.display='none';
  document.getElementById('p-bloque-resto').style.display='none';
  document.getElementById('p-maq-preview').style.display='none';
  document.getElementById('p-comp-preview').style.display='none';
  document.getElementById('p-hist-box').style.display='none';
  ['p-desc','p-mat','p-priv'].forEach(id=>document.getElementById(id).value='');
  fotosTemp.parte=[];renderFotosTemp('parte');
  const now=new Date();
  document.getElementById('p-fecha').value=now.toISOString().slice(0,10);
  document.getElementById('p-hinicio').value=now.toTimeString().slice(0,5);
  document.getElementById('p-hfin').value='';
  chips.ptipo='Correctivo';chips.comp='Motor/Turbina';
  document.getElementById('chips-ptipo').querySelectorAll('.chip').forEach((c,i)=>c.classList.toggle('on',i===0));
  document.getElementById('chips-comp').querySelectorAll('.chip').forEach((c,i)=>c.classList.toggle('on',i===0));
  if(maqId){
    const m=maquinas.find(x=>x.id===maqId);
    if(m){pCli.value=m.clienteId;onClienteChange();setTimeout(()=>{document.getElementById('p-maquina').value=maqId;onMaquinaChange();},50);}
  }
  abrirOv('ov-parte');
}
function onClienteChange(){
  const cliId=document.getElementById('p-cliente').value;
  document.getElementById('p-bloque-maq').style.display=cliId?'block':'none';
  document.getElementById('p-bloque-resto').style.display='none';
  document.getElementById('p-maq-preview').style.display='none';
  maqConfirmada=false;
  const sel=document.getElementById('p-maquina');
  sel.innerHTML='<option value="">— seleccionar —</option>';
  maquinas.filter(m=>m.clienteId===cliId).forEach(m=>{
    const s=sedes.find(x=>x.id===m.sedeId);
    const o=document.createElement('option');
    o.value=m.id;o.textContent=(s?s.nombre.replace(/HVT\s*/,''):'')+'  —  '+m.id+'  ('+m.marca+')';
    sel.appendChild(o);
  });
}
function onMaquinaChange(){
  const maqId=document.getElementById('p-maquina').value;
  if(!maqId){document.getElementById('p-maq-preview').style.display='none';document.getElementById('p-bloque-resto').style.display='none';maqConfirmada=false;return;}
  const m=maquinas.find(x=>x.id===maqId);if(!m)return;
  const dr=(k,v)=>v?`<div class="preview-row"><span class="preview-k">${k}</span><span class="preview-v">${v}</span></div>`:'';
  let html=dr('Tipo',m.tipo)+dr('Marca',m.marca)+dr('Modelo',m.modelo)+dr('Serie',m.serie)+dr('Año',m.anio);
  if(m.arranque)html+=dr('Arranque',m.arranque);
  if(m.motExt?.marca)html+=dr('Motor ext.',m.motExt.marca+(m.motExt.rdf?' · rod. '+m.motExt.rdf+'/'+m.motExt.rdt:''));
  if(m.motImp?.marca||m.motImp?.rdf)html+=dr('Motor imp.',(m.motImp?.marca||'—')+(m.motImp?.rdf?' · rod. '+m.motImp.rdf+'/'+m.motImp.rdt:''));
  if(m.quemador?.chicle)html+=dr('Quemador',m.quemador.marca+' · chicle '+m.quemador.chicle);
  if(m.obs)html+=dr('Obs.',m.obs);
  document.getElementById('p-maq-preview-body').innerHTML=html;
  document.getElementById('p-maq-preview').style.display='block';
  document.getElementById('p-bloque-resto').style.display='none';
  maqConfirmada=false;
  setTimeout(()=>document.getElementById('p-maq-preview').scrollIntoView({behavior:'smooth',block:'nearest'}),100);
}
function confirmarMaquina(si){
  if(si){
    maqConfirmada=true;
    document.getElementById('p-maq-preview').style.display='none';
    document.getElementById('p-bloque-resto').style.display='block';
    mostrarHistorial();
    setTimeout(()=>document.getElementById('p-bloque-resto').scrollIntoView({behavior:'smooth',block:'start'}),100);
  }else{
    document.getElementById('p-maquina').value='';
    document.getElementById('p-maq-preview').style.display='none';
    document.getElementById('p-bloque-resto').style.display='none';
    maqConfirmada=false;
  }
}
function mostrarHistorial(){
  const maqId=document.getElementById('p-maquina').value;
  const ult=partes.filter(p=>p.maqId===maqId).sort((a,b)=>b.ts-a.ts).slice(0,3);
  if(!ult.length){document.getElementById('p-hist-box').style.display='none';return;}
  const bd=t=>t==='Correctivo'?'b-red':t==='Preventivo'?'b-green':'b-gray';
  document.getElementById('p-hist-body').innerHTML=ult.map(p=>`
    <div class="hist-item">
      <div class="hist-date">${p.fecha}${p.hinicio?' '+p.hinicio:''} · <span class="badge ${bd(p.tipo)}" style="font-size:10px;padding:1px 6px">${p.tipo}</span> · ${p.componente}</div>
      <div class="hist-desc">${p.desc}</div>
      ${p.materiales?`<div style="font-size:12px;color:var(--text3);margin-top:2px">${p.materiales}</div>`:''}
    </div>`).join('');
  document.getElementById('p-hist-box').style.display='block';
}
function mostrarCompPreview(comp){
  const maqId=document.getElementById('p-maquina').value;
  if(!maqId||!maqConfirmada){document.getElementById('p-comp-preview').style.display='none';return;}
  const m=maquinas.find(x=>x.id===maqId);if(!m){document.getElementById('p-comp-preview').style.display='none';return;}
  const dr=(k,v)=>v?`<div class="preview-row"><span class="preview-k">${k}</span><span class="preview-v">${v}</span></div>`:'';
  let html='';
  if(comp==='Motor/Turbina'){
    if(m.motExt?.marca||m.motExt?.rdf)html+=dr('Motor ext.',(m.motExt?.marca||'—')+(m.motExt?.rdf?' · rod. '+m.motExt.rdf+'/'+m.motExt.rdt:''));
    if(m.motImp?.marca||m.motImp?.rdf)html+=dr('Motor imp.',(m.motImp?.marca||'—')+(m.motImp?.rdf?' · rod. '+m.motImp.rdf+'/'+m.motImp.rdt:''));
  }else if(comp==='Quemador'&&m.quemador?.marca){
    html+=dr('Modelo',m.quemador.marca)+dr('Centralita',m.quemador.central)+dr('Chicle/Aire',m.quemador.chicle+' / '+m.quemador.aire);
  }
  if(!html){document.getElementById('p-comp-preview').style.display='none';return;}
  document.getElementById('p-comp-preview-body').innerHTML=html;
  document.getElementById('p-comp-preview').style.display='block';
}
async function guardarParte(){
  const maqId=document.getElementById('p-maquina').value;
  const desc=document.getElementById('p-desc').value.trim();
  if(!maqId||!desc){alert('Máquina y descripción son obligatorias');return;}
  if(!maqConfirmada){alert('Confirma la máquina antes de guardar');return;}
  const m=maquinas.find(x=>x.id===maqId);
  const ts=Date.now();
  const parte={id:'p-'+ts,ts,fecha:document.getElementById('p-fecha').value,hinicio:document.getElementById('p-hinicio').value,hfin:document.getElementById('p-hfin').value,maqId,clienteId:m?.clienteId||'',tipo:chips.ptipo,componente:chips.comp,desc,materiales:document.getElementById('p-mat').value.trim(),priv:document.getElementById('p-priv').value.trim()};
  await dbPut('partes',parte);
  for(const b of fotosTemp.parte)await dbPut('fotos',{parteId:parte.id,maqId,data:b,fecha:new Date().toISOString(),fid:undefined});
  partes=await dbAll('partes');
  cerrar('ov-parte');renderPartes();
}

// ═══ DETALLE PARTE ════════════════════════════════════════════
async function abrirDetalleParte(id){
  const p=partes.find(x=>x.id===id);if(!p)return;
  const m=maquinas.find(x=>x.id===p.maqId);
  const s=m?sedes.find(x=>x.id===m.sedeId):null;
  const c=clientes.find(x=>x.id===p.clienteId);
  const bd=p.tipo==='Correctivo'?'b-red':p.tipo==='Preventivo'?'b-green':p.tipo==='Inspección'?'b-blue':'b-gray';
  document.getElementById('det-parte-titulo').textContent=p.maqId+' · '+p.fecha;
  const dr=(k,v)=>v?`<div class="dr"><span class="dk">${k}</span><span class="dv">${v}</span></div>`:'';
  let html=`<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap"><span class="badge ${bd}">${p.tipo}</span><span class="badge b-gray">${p.componente}</span></div>`;
  html+=dr('Cliente',c?.nombre)+dr('Sede',s?.nombre)+dr('Máquina',p.maqId)+dr('Fecha',p.fecha);
  html+=dr('Horario',p.hinicio?(p.hinicio+(p.hfin?' — '+p.hfin:'')):'—');
  if(p.hinicio&&p.hfin){const[h1,m1]=p.hinicio.split(':').map(Number);const[h2,m2]=p.hfin.split(':').map(Number);const hh=((h2*60+m2-h1*60-m1)/60).toFixed(1);if(parseFloat(hh)>0)html+=dr('Duración',hh+' h');}
  html+='<div class="sep">Trabajo realizado</div>';
  html+=`<p style="font-size:14px;line-height:1.6;white-space:pre-wrap">${p.desc}</p>`;
  if(p.materiales){html+='<div class="sep">Materiales / factura</div>';html+=`<p style="font-size:14px;line-height:1.6;white-space:pre-wrap">${p.materiales}</p>`;}
  html+='<div class="sep">Fotos</div><div id="fotos-det-parte-'+p.id+'"><p style="font-size:13px;color:var(--text3)">Cargando...</p></div>';
  if(p.priv)html+=`<div class="priv-box" style="margin-top:12px"><div class="priv-label">Nota privada</div><p style="font-size:13px;line-height:1.5;white-space:pre-wrap">${p.priv}</p></div>`;
  document.getElementById('det-parte-body').innerHTML=html;
  abrirOv('ov-det-parte');
  const fotos=await dbWhere('fotos','parteId',p.id);
  const cont=document.getElementById('fotos-det-parte-'+p.id);
  if(cont){if(!fotos.length)cont.innerHTML='<p style="font-size:13px;color:var(--text3)">Sin fotos.</p>';else cont.innerHTML='<div class="foto-grid">'+fotos.map(f=>`<img class="fthumb" src="${f.data}" onclick="abrirVisor({tipo:'db',id:${f.fid},src:'${f.data}'})">`).join('')+'</div>';}
}

function abrirMaq(id){

  poblarFiltros();
  const fs=['id','marca','serie','anio','obs','imp-marca','imp-kw','imp-rpm','imp-amp','imp-cos','imp-rdf','imp-rdt','imp-ref','imp-ns','ext-marca','ext-kw','ext-rpm','ext-amp','ext-cos','ext-rdf','ext-rdt','ext-ref','ext-ns','que-marca','que-central','que-bomba','que-chicle','que-aire'];

  if(m){document.getElementById('m-cliente').value=m.clienteId;poblarSedes();setTimeout(()=>{document.getElementById('m-sede').value=m.sedeId||'';},50);}
  const tipo=m?m.tipo:'Cabina pintura';chips.mtipo=tipo;
  document.getElementById('chips-mtipo').querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.textContent.trim()===tipo));
  document.getElementById('extra-cabina').style.display=tipo==='Cabina pintura'?'block':'none';
  const arr=m?(m.arranque||'D-Y'):'D-Y';chips.arranque=arr;
  document.getElementById('chips-arranque').querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.textContent.trim()===arr));
  fotosTemp.maq=[];renderFotosTemp('maq');
  abrirOv('ov-maq');
}
function gv(m,f){
  if(f.startsWith('imp-'))return m.motImp?m.motImp[f.slice(4)]:'';
  if(f.startsWith('ext-'))return m.motExt?m.motExt[f.slice(4)]:'';
  if(f.startsWith('que-'))return m.quemador?m.quemador[f.slice(4)]:'';
  return m[f];
}
function v(id){return(document.getElementById(id)?.value||'').trim();}
async function guardarMaquina(){
  const cli=v('m-cliente'),sede=v('m-sede'),id=v('m-id');
  if(!cli||!sede||!id){alert('Cliente, sede e ID son obligatorios');return;}
  const maq={id,clienteId:cli,sedeId:sede,tipo:chips.mtipo,marca:v('m-marca'),serie:v('m-serie'),anio:v('m-anio'),obs:v('m-obs'),fechaAlta:new Date().toISOString().slice(0,10)};
  if(chips.mtipo==='Cabina pintura'){
    maq.arranque=chips.arranque;
    maq.motImp={marca:v('m-imp-marca'),kw:v('m-imp-kw'),rpm:v('m-imp-rpm'),amp:v('m-imp-amp'),cos:v('m-imp-cos'),rdf:v('m-imp-rdf'),rdt:v('m-imp-rdt'),ref:v('m-imp-ref'),ns:v('m-imp-ns')};
    maq.motExt={marca:v('m-ext-marca'),kw:v('m-ext-kw'),rpm:v('m-ext-rpm'),amp:v('m-ext-amp'),cos:v('m-ext-cos'),rdf:v('m-ext-rdf'),rdt:v('m-ext-rdt'),ref:v('m-ext-ref'),ns:v('m-ext-ns')};
    maq.quemador={marca:v('m-que-marca'),central:v('m-que-central'),bomba:v('m-que-bomba'),chicle:v('m-que-chicle'),aire:v('m-que-aire')};
  }
  await dbPut('maquinas',maq);
  for(const b of fotosTemp.maq)await dbPut('fotos',{maqId:id,data:b,fecha:new Date().toISOString(),fid:undefined});
  maquinas=await dbAll('maquinas');
  cerrar('ov-maq');renderMaquinas();
}
async function eliminarMaquina(){
  if(!confirm('¿Eliminar '+editMaqId+'?'))return;
  await dbDel('maquinas',editMaqId);
  maquinas=await dbAll('maquinas');
  cerrar('ov-maq');renderMaquinas();
}
async function abrirDetMaq(id){
  detMaqId=id;
  const m=maquinas.find(x=>x.id===id);
  const s=sedes.find(x=>x.id===m.sedeId);
  const c=clientes.find(x=>x.id===m.clienteId);
  document.getElementById('det-maq-titulo').textContent=m.id;
  const dr=(k,vv)=>vv?`<div class="dr"><span class="dk">${k}</span><span class="dv">${vv}</span></div>`:'';
  let html=dr('Cliente',c?.nombre)+dr('Sede',s?.nombre)+dr('Tipo',m.tipo)+dr('Marca',m.marca)+dr('Modelo',m.modelo)+dr('Serie',m.serie)+dr('Año',m.anio);
  if(m.arranque)html+=dr('Arranque',m.arranque);
  if(m.motExt?.marca||m.motExt?.rdf){html+='<div class="sep">Motor extracción</div>';html+=dr('Marca',m.motExt.marca)+dr('Ref.',m.motExt.ref);if(m.motExt.kw)html+=dr('kW/rpm',m.motExt.kw+'/'+m.motExt.rpm);if(m.motExt.amp)html+=dr('A/Cosφ',m.motExt.amp+'/'+m.motExt.cos);if(m.motExt.rdf)html+=dr('Rodamientos',m.motExt.rdf+' · '+m.motExt.rdt);html+=dr('Nº serie',m.motExt.ns);}
  if(m.motImp?.marca||m.motImp?.rdf){html+='<div class="sep">Motor impulsión</div>';html+=dr('Marca',m.motImp.marca)+dr('Ref.',m.motImp.ref);if(m.motImp.kw)html+=dr('kW/rpm',m.motImp.kw+'/'+m.motImp.rpm);if(m.motImp.rdf)html+=dr('Rodamientos',m.motImp.rdf+' · '+m.motImp.rdt);html+=dr('Nº serie',m.motImp.ns);}
  if(m.quemador?.marca){html+='<div class="sep">Quemador</div>';html+=dr('Modelo',m.quemador.marca)+dr('Centralita',m.quemador.central)+dr('Bomba',m.quemador.bomba);if(m.quemador.chicle)html+=dr('Chicle/Aire',m.quemador.chicle+' · '+m.quemador.aire);}
  const ps=partes.filter(p=>p.maqId===id).sort((a,b)=>b.ts-a.ts);
  html+=`<div class="sep">Partes (${ps.length})</div>`;
  if(!ps.length)html+='<p style="font-size:13px;color:var(--text3)">Sin partes registrados.</p>';
  else ps.slice(0,10).forEach(p=>{
    const bd=p.tipo==='Correctivo'?'b-red':p.tipo==='Preventivo'?'b-green':'b-gray';
    html+=`<div class="hist-item" onclick="cerrar('ov-det-maq');abrirDetalleParte('${p.id}')">
      <div class="hist-date">${p.fecha} · <span class="badge ${bd}" style="font-size:10px;padding:1px 5px">${p.tipo}</span> · ${p.componente}</div>
      <div class="hist-desc">${p.desc.slice(0,100)}${p.desc.length>100?'…':''}</div>
    </div>`;
  });
  if(m.obs)html+=`<p style="font-size:13px;color:var(--text2);margin-top:10px">${m.obs}</p>`;
  document.getElementById('det-maq-body').innerHTML=html;
  abrirOv('ov-det-maq');
}
function editarMaqDesdeDet(){cerrar('ov-det-maq');abrirMaq(detMaqId);}
function nuevaParteDesdeDet(){cerrar('ov-det-maq');abrirParte(detMaqId);}

// ═══ FOTOS ════════════════════════════════════════════════════
function comprimir(file){return new Promise(res=>{const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height,mx=1200;if(w>mx||h>mx){if(w>h){h=Math.round(h*mx/w);w=mx;}else{w=Math.round(w*mx/h);h=mx;}}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',.78));};img.src=e.target.result;};r.readAsDataURL(file);});}
async function addFotos(ctx,e){for(const f of Array.from(e.target.files)){const b=await comprimir(f);fotosTemp[ctx].push(b);}renderFotosTemp(ctx);e.target.value='';}
function renderFotosTemp(ctx){
  const grid=document.getElementById('fotos-'+ctx+'-grid');
  const inp='foto-'+ctx+'-in';
  let h=fotosTemp[ctx].map((b,i)=>`<img class="fthumb" src="${b}" onclick="abrirVisor({tipo:'temp',ctx:'${ctx}',idx:${i}})">`).join('');
  h+=`<div class="fadd" onclick="document.getElementById('${inp}').click()"><svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>Foto</div>`;
  grid.innerHTML=h;
}
function abrirVisor(ctx){visorCtx=ctx;const src=ctx.tipo==='temp'?fotosTemp[ctx.ctx][ctx.idx]:ctx.src;document.getElementById('fv-img').src=src;document.getElementById('fviewer').classList.add('open');}
function cerrarVisor(){document.getElementById('fviewer').classList.remove('open');visorCtx=null;}
async function eliminarFotoActual(){if(!visorCtx)return;if(visorCtx.tipo==='temp'){fotosTemp[visorCtx.ctx].splice(visorCtx.idx,1);renderFotosTemp(visorCtx.ctx);}else if(visorCtx.tipo==='db'){await dbDel('fotos',visorCtx.id);}cerrarVisor();}

// ═══ RENDER MÁQUINAS ══════════════════════════════════════════
function renderMaquinas(){
  const cont=document.getElementById('lista-maquinas');
  const fCli=document.getElementById('fm-cliente').value;
  const fTipo=document.getElementById('fm-tipo').value;
  let lista=maquinas;
  if(fCli)lista=lista.filter(m=>m.clienteId===fCli);
  if(fTipo)lista=lista.filter(m=>m.tipo===fTipo);
  if(!lista.length){cont.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg><p>Sin máquinas. Pulsa "+ Nueva".</p></div>`;return;}
  const porSede={};
  lista.forEach(m=>{if(!porSede[m.sedeId])porSede[m.sedeId]=[];porSede[m.sedeId].push(m);});
  let html='';
  Object.entries(porSede).forEach(([sedeId,items])=>{
    const s=sedes.find(x=>x.id===sedeId);
    html+=`<div class="group-label">${s?s.nombre:sedeId}</div>`;
    items.forEach(m=>{
      const ps=partes.filter(p=>p.maqId===m.id);
      const last=[...ps].sort((a,b)=>b.ts-a.ts)[0];
      const tb=m.tipo==='Cabina pintura'?'b-amber':m.tipo==='Elevador'?'b-blue':m.tipo==='Compresor'?'b-green':'b-gray';
      html+=`<div class="card" onclick="abrirDetMaq('${m.id}')">
        <div class="card-top">
          <div><div class="card-id">${m.id}</div><div class="card-sub">${m.marca||''}${m.modelo?' · '+m.modelo:''}${m.arranque?' · '+m.arranque:''}</div></div>
          <span class="badge ${tb}">${m.tipo}</span>
        </div>
        <div class="card-foot">${ps.length} partes${last?' · último '+last.fecha:''}</div>
      </div>`;
    });
  });
  cont.innerHTML=html;
}

// ═══ RENDER PARTES ════════════════════════════════════════════
function limpiarFiltros(){
  document.getElementById('fp-cliente').value='';
  document.getElementById('fp-desde').value='';
  document.getElementById('fp-hasta').value='';
  document.getElementById('fp-texto').value='';
  renderPartes();
}
function renderPartes(){
  const cont=document.getElementById('lista-partes');
  let lista=[...partes].sort((a,b)=>b.ts-a.ts);
  const fCli=document.getElementById('fp-cliente').value;
  const fDesde=document.getElementById('fp-desde').value;
  const fHasta=document.getElementById('fp-hasta').value;
  const fTxt=document.getElementById('fp-texto').value.toLowerCase().trim();
  if(fCli)lista=lista.filter(p=>p.clienteId===fCli);
  if(fDesde)lista=lista.filter(p=>p.fecha>=fDesde);
  if(fHasta)lista=lista.filter(p=>p.fecha<=fHasta);
  if(fTxt)lista=lista.filter(p=>[p.desc,p.materiales,p.maqId,p.tipo,p.componente,p.fecha].join(' ').toLowerCase().includes(fTxt));
  if(!lista.length){cont.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg><p>Sin partes con esos filtros.</p></div>`;return;}
  let html='',lastMes='';
  lista.forEach(p=>{
    const mes=p.fecha.slice(0,7);
    if(mes!==lastMes){
      const[y,mo]=mes.split('-');
      const M=['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
      html+=`<div class="group-label">${M[parseInt(mo)]} ${y}</div>`;
      lastMes=mes;
    }
    const m2=maquinas.find(x=>x.id===p.maqId);
    const s=m2?sedes.find(x=>x.id===m2.sedeId):null;
    const bd=p.tipo==='Correctivo'?'b-red':p.tipo==='Preventivo'?'b-green':p.tipo==='Inspección'?'b-blue':'b-gray';
    html+=`<div class="card" onclick="abrirDetalleParte('${p.id}')">
      <div class="card-top">
        <div><div class="card-id">${p.maqId}</div><div class="card-sub">${s?s.nombre.replace(/HVT\s*/,''):''} · ${p.componente}${p.hinicio?' · '+p.hinicio+(p.hfin?'–'+p.hfin:''):''}</div></div>
        <div style="text-align:right"><span class="badge ${bd}">${p.tipo}</span><div style="font-size:11px;color:var(--text3);margin-top:4px">${p.fecha}</div></div>
      </div>
      <div style="font-size:14px;margin-top:6px;line-height:1.4">${p.desc.slice(0,120)}${p.desc.length>120?'…':''}</div>
      ${p.materiales?`<div style="font-size:12px;color:var(--text3);margin-top:4px">${p.materiales.slice(0,80)}${p.materiales.length>80?'…':''}</div>`:''}
    </div>`;
  });
  cont.innerHTML=html;
}

// ═══ RESUMEN ══════════════════════════════════════════════════
function renderResumen(){
  const nM=maquinas.length,nP=partes.length;
  const nC=partes.filter(p=>p.tipo==='Correctivo').length;
  const nPr=partes.filter(p=>p.tipo==='Preventivo').length;
  const hT=partes.reduce((s,p)=>{if(p.hinicio&&p.hfin){const[h1,m1]=p.hinicio.split(':').map(Number);const[h2,m2]=p.hfin.split(':').map(Number);return s+Math.max(0,(h2*60+m2-h1*60-m1)/60);}return s;},0);
  const porMaq={};partes.forEach(p=>{porMaq[p.maqId]=(porMaq[p.maqId]||0)+1;});
  const topMaq=Object.entries(porMaq).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const recientes=[...partes].sort((a,b)=>b.ts-a.ts);
  document.getElementById('resumen-content').innerHTML=`
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num">${nM}</div><div class="stat-lbl">Máquinas</div></div>
    <div class="stat-card"><div class="stat-num">${nP}</div><div class="stat-lbl">Partes</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--red)">${nC}</div><div class="stat-lbl">Correctivos</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--green)">${nPr}</div><div class="stat-lbl">Preventivos</div></div>
  </div>
  <div class="stat-card" style="margin:0 16px 12px"><div class="stat-num" style="color:var(--accent)">${hT.toFixed(1)}</div><div class="stat-lbl">Horas registradas (con horario)</div></div>
  <div class="sync-row"><div class="sdot ${navigator.onLine?'':'off'}"></div><span>${navigator.onLine?'En línea':'Sin conexión — datos locales'}</span></div>
  <div class="group-label">Máquinas con más intervenciones</div>
  <div style="padding:0 16px">
  ${topMaq.map(([maqId,n])=>{const m=maquinas.find(x=>x.id===maqId);return`<div class="card" style="cursor:default"><div class="card-top"><div class="card-id">${maqId}</div><span class="badge b-gray">${n} partes</span></div><div class="card-sub">${m?m.marca+' · '+m.tipo:''}</div></div>`;}).join('')}
  </div>
  <div class="group-label">Todos los partes</div>
  <div style="padding:0 16px">
  ${recientes.map(p=>{const bd=p.tipo==='Correctivo'?'b-red':p.tipo==='Preventivo'?'b-green':'b-gray';return`<div class="card" onclick="abrirDetalleParte('${p.id}')"><div class="card-top"><div class="card-id">${p.maqId}</div><div style="text-align:right"><span class="badge ${bd}">${p.tipo}</span><div style="font-size:11px;color:var(--text3);margin-top:4px">${p.fecha}</div></div></div><div style="font-size:14px;margin-top:5px;line-height:1.4">${p.desc.slice(0,100)}${p.desc.length>100?'…':''}</div></div>`;}).join('')}
  </div>
  <div style="padding:0 16px">
    <button class="btn btn-g" onclick="exportarJSON()">Exportar JSON</button>
    <button class="btn btn-g" onclick="importarJSON()">Importar JSON</button>
  </div>`;
}
function renderAll(){poblarFiltros();renderMaquinas();renderPartes();}

// ═══ EXPORT / IMPORT ══════════════════════════════════════════
function exportarJSON(){
  const data={version:'1.2',exportado:new Date().toISOString(),clientes,sedes,maquinas,partes};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='sentinel_field_'+new Date().toISOString().slice(0,10)+'.json';a.click();
  URL.revokeObjectURL(url);
}
function importarJSON(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=async e=>{
    const f=e.target.files[0];if(!f)return;
    try{
      const data=JSON.parse(await f.text());
      if(data.clientes)for(const c of data.clientes)await dbPut('clientes',c);
      if(data.sedes)for(const s of data.sedes)await dbPut('sedes',s);
      if(data.maquinas)for(const m of data.maquinas)await dbPut('maquinas',m);
      if(data.partes)for(const p of data.partes)await dbPut('partes',p);
      if(data.intervenciones)for(const i of data.intervenciones)await dbPut('partes',{...i,id:i.id||'p-'+i.ts});
      [clientes,sedes,maquinas,partes]=await Promise.all([dbAll('clientes'),dbAll('sedes'),dbAll('maquinas'),dbAll('partes')]);
      poblarFiltros();renderAll();
      alert('Importado correctamente.');
    }catch(err){alert('Error: '+err.message);}
  };
  inp.click();
}

// ═══ UTILS ════════════════════════════════════════════════════
function abrirOv(id){document.getElementById(id).classList.add('open');document.getElementById('main').style.overflow='hidden';}
function cerrar(id){document.getElementById(id).classList.remove('open');document.getElementById('main').style.overflow='';}
window.addEventListener('online',()=>document.getElementById('offline-bar').classList.remove('show'));
window.addEventListener('offline',()=>document.getElementById('offline-bar').classList.add('show'));
if(!navigator.onLine)document.getElementById('offline-bar').classList.add('show');
if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});

// INICIO
initAuth();
</script>
