<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Sentinel Field">
<meta name="theme-color" content="#f0f0f0">
<title>Sentinel Field</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#eaeaea;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif}
#lock-wrap{position:fixed;inset:0;background:#eaeaea;display:flex;align-items:center;justify-content:center;z-index:999;transition:opacity .3s}
#lock-wrap.fade{opacity:0;pointer-events:none}
.box{background:#fff;border-radius:16px;padding:32px 24px;width:min(340px,88vw);text-align:center;box-shadow:0 2px 24px rgba(0,0,0,0.08)}
.icon{font-size:52px;margin-bottom:12px}
.title{font-size:20px;font-weight:700;color:#111;margin-bottom:6px;letter-spacing:-.02em}
.sub{font-size:13px;color:#888;margin-bottom:20px;line-height:1.4}
input[type=password]{width:100%;background:#f2f2f2;border:0.5px solid rgba(0,0,0,0.1);border-radius:8px;padding:13px 14px;font-size:16px;font-family:inherit;color:#111;outline:none;margin-bottom:10px;-webkit-appearance:none;text-align:center;letter-spacing:.15em}
input[type=password]:focus{border-color:#1a6fa8;background:#fff}
.btn-acc{width:100%;padding:13px;background:#1a6fa8;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:8px}
.btn-acc:active{opacity:.85}
.btn-fid{width:100%;padding:11px;background:#f2f2f2;color:#1a6fa8;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:none}
.btn-fid:active{opacity:.75}
.err{font-size:13px;color:#c0392b;margin-top:8px;min-height:18px}
.hint{font-size:11px;color:#bbb;margin-top:10px}
#app-frame{position:fixed;inset:0;width:100%;height:100%;border:none;display:none}
.spinner{width:32px;height:32px;border:3px solid #e0e0e0;border-top-color:#1a6fa8;border-radius:50%;animation:spin .7s linear infinite;margin:16px auto 0}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="lock-wrap">
  <div class="box">
    <div class="icon">🔧</div>
    <div class="title">Sentinel Field</div>
    <div class="sub" id="lock-sub">Introduce la contraseña para acceder</div>
    <input type="password" id="pwd" placeholder="Contraseña"
      autocomplete="current-password"
      onkeydown="if(event.key==='Enter')unlock()">
    <button class="btn-acc" id="btn-acc" onclick="unlock()">Acceder</button>
    <button class="btn-fid" id="btn-fid" onclick="usarFaceID()">Face ID / Touch ID</button>
    <div class="err" id="err"></div>
    <div class="hint">Acceso restringido — Sentinel Field</div>
  </div>
</div>

<iframe id="app-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-modals"></iframe>

const ITERS    = 600000;

// ── CREDENCIAL FACE ID ────────────────────────────────────────
const CRED_KEY = 'sf_fid_cred';
const PWD_HASH_KEY = 'sf_pwd_hash';

function b64ToArr(b64){ return Uint8Array.from(atob(b64), c=>c.charCodeAt(0)); }

async function derivarClave(pwd, salt){
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', enc.encode(pwd), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, iterations:ITERS, hash:'SHA-256' },
    km, { name:'AES-GCM', length:256 }, false, ['decrypt']
  );
}

async function descifrarHTML(pwd){
  const salt = b64ToArr(SALT_B64);
  const iv   = b64ToArr(IV_B64);
  const ct   = b64ToArr(CT_B64);
  const key  = await derivarClave(pwd, salt);
  const plain = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, ct);
  return new TextDecoder().decode(plain);
}

async function guardarHashPwd(pwd){
  const enc = new TextEncoder();
  const hash = await crypto.subtle.digest('SHA-256', enc.encode(pwd));
  sessionStorage.setItem(PWD_HASH_KEY, btoa(String.fromCharCode(...new Uint8Array(hash))));
}

function lanzarApp(html){
  const frame = document.getElementById('app-frame');
  frame.style.display = 'block';
  const wrap = document.getElementById('lock-wrap');
  wrap.classList.add('fade');
  setTimeout(()=>{ wrap.style.display='none'; }, 350);
  // Escribir en el iframe via srcdoc
  frame.srcdoc = html;
}

async function unlock(){
  const pwd = document.getElementById('pwd').value;
  if(!pwd){ mostrarErr('Introduce la contraseña'); return; }
  const btn = document.getElementById('btn-acc');
  btn.textContent = 'Verificando...';
  btn.disabled = true;
  document.getElementById('err').textContent = '';
  try {
    const html = await descifrarHTML(pwd);
    await guardarHashPwd(pwd);
    // Ofrecer Face ID si no está registrado
    if(window.PublicKeyCredential && !localStorage.getItem(CRED_KEY)){
      setTimeout(()=>ofrecerFaceID(pwd), 800);
    }
    lanzarApp(html);
  } catch(e){
    mostrarErr('Contraseña incorrecta');
    btn.textContent = 'Acceder';
    btn.disabled = false;
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
}

function mostrarErr(msg){
  document.getElementById('err').textContent = msg;
  setTimeout(()=>document.getElementById('err').textContent='', 2500);
}

// ── FACE ID ───────────────────────────────────────────────────
async function ofrecerFaceID(pwd){
  if(!window.PublicKeyCredential) return;
  const ok = confirm('¿Activar Face ID para acceder más rápido la próxima vez?');
  if(!ok) return;
  try {
    const cred = await navigator.credentials.create({ publicKey:{
      challenge: crypto.getRandomValues(new Uint8Array(32)),
      rp: { name:'Sentinel Field', id: location.hostname },
      user: { id: new Uint8Array(16), name:'tecnico', displayName:'Técnico' },
      pubKeyCredParams: [{ alg:-7, type:'public-key' }],
      authenticatorSelection: { userVerification:'required' },
      timeout: 30000
    }});
    localStorage.setItem(CRED_KEY, btoa(String.fromCharCode(...new Uint8Array(cred.rawId))));
    // Guardar pwd cifrada con clave derivada del propio credential id para recuperarla
    // Usamos sessionStorage para no exponer la pwd en claro
    sessionStorage.setItem('sf_pwd_session', pwd);
    alert('Face ID activado ✓ — el próximo acceso será automático');
  } catch(e){ console.log('Face ID no registrado:', e.message); }
}

async function usarFaceID(){
  if(!window.PublicKeyCredential) return;
  const credB64 = localStorage.getItem(CRED_KEY);
  const pwd = sessionStorage.getItem('sf_pwd_session');
  if(!credB64 || !pwd){ mostrarErr('Face ID no disponible, usa la contraseña'); return; }
  document.getElementById('btn-fid').textContent = 'Verificando...';
  try {
    const credId = b64ToArr(credB64);
    const assertion = await navigator.credentials.get({ publicKey:{
      challenge: crypto.getRandomValues(new Uint8Array(32)),
      allowCredentials: [{ type:'public-key', id: credId }],
      userVerification: 'required',
      timeout: 30000
    }});
    if(assertion){
      const html = await descifrarHTML(pwd);
      lanzarApp(html);
    }
  } catch(e){
    document.getElementById('btn-fid').textContent = 'Face ID / Touch ID';
    mostrarErr('Face ID fallido — usa la contraseña');
  }
}

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('load', ()=>{
  // Mostrar botón Face ID si hay credencial y pwd en sesión
  const hasCred = localStorage.getItem(CRED_KEY);
  const hasPwd  = sessionStorage.getItem('sf_pwd_session');
  if(hasCred && hasPwd && window.PublicKeyCredential){
    document.getElementById('btn-fid').style.display = 'block';
    document.getElementById('lock-sub').textContent = 'Usa Face ID o introduce la contraseña';
    setTimeout(usarFaceID, 500); // Intento automático
  }
  document.getElementById('pwd').focus();
});
</script>
