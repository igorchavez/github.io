<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Sentinel Field">
<meta name="theme-color" content="#f0f0f0">
<title>Sentinel Field</title>
<style>
:root{
  --bg:#eaeaea;--surface:#fff;--surface2:#f2f2f2;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);
  --text:#111;--text2:#666;--text3:#aaa;
  --accent:#1a6fa8;--accent-dim:rgba(26,111,168,0.10);
  --red:#c0392b;--red-dim:rgba(192,57,43,0.10);
  --green:#27ae60;--green-dim:rgba(39,174,96,0.10);
  --amber:#e67e22;--amber-dim:rgba(230,126,34,0.10);
  --radius:10px;--radius-sm:6px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;font-size:15px}
body{display:flex;flex-direction:column}

/* LOCK SCREEN */
#lock-screen{position:fixed;inset:0;background:var(--surface);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:20px}
#lock-screen.hidden{display:none}
.lock-logo{font-size:48px;margin-bottom:8px}
.lock-title{font-size:22px;font-weight:700;letter-spacing:-0.02em;color:var(--text)}
.lock-sub{font-size:14px;color:var(--text2);text-align:center;line-height:1.5}
.lock-pin{display:flex;gap:12px;margin:8px 0}
.lock-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);background:none;transition:background 0.15s}
.lock-dot.filled{background:var(--accent);border-color:var(--accent)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px}
.pin-btn{height:64px;background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--radius);font-size:22px;font-weight:400;color:var(--text);cursor:pointer;font-family:inherit;transition:background 0.1s}
.pin-btn:active{background:var(--border2)}
.pin-btn.del{font-size:16px;color:var(--text2)}
.lock-faceid{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px}
.lock-error{font-size:13px;color:var(--red);min-height:18px;text-align:center}
.setup-hint{font-size:12px;color:var(--text3);text-align:center;margin-top:4px}

/* NAV */
.nav{display:flex;background:var(--surface);border-top:0.5px solid var(--border);flex-shrink:0;padding-bottom:var(--safe-bottom);order:2}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;border:none;background:none;color:var(--text3);font-size:10px;font-family:inherit;cursor:pointer;transition:color 0.15s}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.nav-btn.active{color:var(--accent)}

/* MAIN */
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;order:1}
.screen{display:none;padding:16px;padding-bottom:24px}
.screen.active{display:block}
.screen-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.screen-title{font-size:20px;font-weight:700;letter-spacing:-0.02em}
.btn-new{display:flex;align-items:center;gap:5px;padding:7px 13px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}

/* CARDS */
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;cursor:pointer}
.card:active{border-color:var(--accent)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.card-id{font-size:15px;font-weight:700}
.card-meta{font-size:12px;color:var(--text2);margin-top:2px}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600}
.b-blue{background:var(--accent-dim);color:var(--accent)}
.b-red{background:var(--red-dim);color:var(--red)}
.b-green{background:var(--green-dim);color:var(--green)}
.b-amber{background:var(--amber-dim);color:var(--amber)}
.b-gray{background:var(--surface2);color:var(--text2)}
.taller-label{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin:16px 0 8px;padding-bottom:4px;border-bottom:0.5px solid var(--border)}
.taller-label:first-child{margin-top:0}

/* FORM */
.fl{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;margin-top:14px;letter-spacing:0.04em;text-transform:uppercase}
.fl:first-child{margin-top:0}
.fi{width:100%;background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-size:15px;font-family:inherit;outline:none;-webkit-appearance:none}
.fi:focus{border-color:var(--accent)}
textarea.fi{resize:vertical;min-height:72px;line-height:1.5}
select.fi{cursor:pointer}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.subsect{border-left:2px solid var(--accent-dim);padding:10px 0 4px 14px;margin:10px 0}
.subsect-title{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:4px}

/* CHIPS */
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.chip{padding:6px 12px;border-radius:20px;border:0.5px solid var(--border2);font-size:13px;background:var(--surface);color:var(--text2);cursor:pointer;font-family:inherit;transition:all 0.15s}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}

/* MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:50;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ov.open{display:block}
.modal{background:var(--bg);border-radius:var(--radius) var(--radius) 0 0;padding:20px 16px;padding-bottom:calc(24px + var(--safe-bottom));margin-top:40px;min-height:calc(100vh - 40px)}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:18px;font-weight:700;letter-spacing:-0.02em}
.modal-close{width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border:none;border-radius:50%;color:var(--text2);cursor:pointer}
.modal-close svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}

/* BUTTONS */
.btn{width:100%;padding:13px;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:10px;border:none}
.btn:active{opacity:0.8}
.btn-p{background:var(--accent);color:#fff}
.btn-g{background:var(--surface);color:var(--text);border:0.5px solid var(--border2)}
.btn-d{background:var(--red-dim);color:var(--red);border:0.5px solid rgba(192,57,43,0.2)}

/* DETAIL */
.dr{display:flex;justify-content:space-between;align-items:baseline;padding:9px 0;border-bottom:0.5px solid var(--border)}
.dr:last-child{border-bottom:none}
.dk{font-size:13px;color:var(--text2);flex-shrink:0;margin-right:12px}
.dv{font-size:13px;text-align:right;word-break:break-all}
.sep{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin:16px 0 8px;padding-bottom:6px;border-bottom:0.5px solid var(--border)}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px}
.stat-num{font-size:28px;font-weight:700;letter-spacing:-0.03em;line-height:1}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:4px}

/* INTERVENCIONES */
.ii{padding:10px 0;border-bottom:0.5px solid var(--border)}
.ii:last-child{border-bottom:none}
.ii-meta{font-size:11px;color:var(--text2);margin-bottom:3px}
.ii-desc{font-size:14px;line-height:1.4}
.ii-mat{font-size:12px;color:var(--text3);margin-top:3px}

/* EMPTY */
.empty{text-align:center;padding:48px 16px;color:var(--text3)}
.empty svg{width:40px;height:40px;stroke:currentColor;fill:none;stroke-width:1;margin-bottom:12px;opacity:0.4}
.empty p{font-size:14px;line-height:1.5}

/* OFFLINE */
.offline-bar{display:none;background:var(--red-dim);border-bottom:0.5px solid var(--red);padding:6px 16px;font-size:12px;color:var(--red);text-align:center;flex-shrink:0;order:0}
.offline-bar.show{display:block}

/* FOTOS */
.foto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.fthumb{width:100%;aspect-ratio:1;object-fit:cover;border-radius:var(--radius-sm);border:0.5px solid var(--border);cursor:pointer}
.fadd{width:100%;aspect-ratio:1;border-radius:var(--radius-sm);border:1px dashed var(--border2);background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;color:var(--text3);font-size:11px}
.fadd svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.5}

/* FOTO VIEWER */
.fviewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:100;flex-direction:column;align-items:center;justify-content:center}
.fviewer.open{display:flex}
.fviewer img{max-width:100%;max-height:82vh;object-fit:contain;border-radius:4px}
.fv-close{position:absolute;top:16px;right:16px;width:36px;height:36px;background:rgba(255,255,255,0.15);border:none;border-radius:50%;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.fv-del{position:absolute;bottom:32px;background:var(--red);color:#fff;border:none;padding:10px 24px;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}

/* SYNC */
.sync-row{display:flex;align-items:center;gap:8px;padding:10px 0;font-size:13px;color:var(--text2)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.sync-dot.off{background:var(--red)}

/* NOTA PRIVADA */
.nota-priv{background:rgba(230,126,34,0.08);border:0.5px solid rgba(230,126,34,0.3);border-radius:var(--radius-sm);padding:8px 10px;margin-top:8px;font-size:13px;color:var(--amber)}
.nota-priv-label{font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--amber);margin-bottom:3px}
</style>
</head>
<body>

<!-- PANTALLA DE BLOQUEO -->
<div id="lock-screen">
  <div class="lock-logo">🔧</div>
  <div class="lock-title">Sentinel Field</div>
  <div class="lock-sub" id="lock-sub">Introduce tu PIN para acceder</div>
  <div class="lock-pin" id="lock-pin">
    <div class="lock-dot" id="d0"></div>
    <div class="lock-dot" id="d1"></div>
    <div class="lock-dot" id="d2"></div>
    <div class="lock-dot" id="d3"></div>
  </div>
  <div class="lock-error" id="lock-error"></div>
  <div class="pin-grid" id="pin-grid">
    <button class="pin-btn" onclick="pinKey('1')">1</button>
    <button class="pin-btn" onclick="pinKey('2')">2</button>
    <button class="pin-btn" onclick="pinKey('3')">3</button>
    <button class="pin-btn" onclick="pinKey('4')">4</button>
    <button class="pin-btn" onclick="pinKey('5')">5</button>
    <button class="pin-btn" onclick="pinKey('6')">6</button>
    <button class="pin-btn" onclick="pinKey('7')">7</button>
    <button class="pin-btn" onclick="pinKey('8')">8</button>
    <button class="pin-btn" onclick="pinKey('9')">9</button>
    <button class="pin-btn" onclick="pinKey('')"></button>
    <button class="pin-btn" onclick="pinKey('0')">0</button>
    <button class="pin-btn del" onclick="pinDel()">⌫</button>
  </div>
  <button class="lock-faceid" id="btn-faceid" onclick="tryFaceID()" style="display:none">Face ID / Touch ID</button>
  <div class="setup-hint" id="setup-hint"></div>
</div>

<div class="offline-bar" id="offline-bar">Sin conexión — datos guardados localmente</div>

<div class="main" id="main">
  <!-- MÁQUINAS -->
  <div class="screen active" id="screen-maquinas">
    <div class="screen-header">
      <span class="screen-title">Máquinas</span>
      <button class="btn-new" onclick="abrirModalMaquina()">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nueva
      </button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <select class="fi" id="filtro-cliente" onchange="renderMaquinas()" style="flex:1">
        <option value="">Todos los clientes</option>
      </select>
      <select class="fi" id="filtro-tipo" onchange="renderMaquinas()" style="flex:1">
        <option value="">Todos los tipos</option>
        <option>Cabina pintura</option>
        <option>Elevador</option>
        <option>Compresor</option>
        <option>Soldadura</option>
        <option>Otro</option>
      </select>
    </div>
    <div id="lista-maquinas"></div>
  </div>

  <!-- PARTES -->
  <div class="screen" id="screen-intervenciones">
    <div class="screen-header">
      <span class="screen-title">Partes</span>
      <button class="btn-new" onclick="abrirModalIntervencion()">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nuevo
      </button>
    </div>
    <div id="lista-intervenciones"></div>
  </div>

  <!-- RESUMEN -->
  <div class="screen" id="screen-resumen">
    <div class="screen-header"><span class="screen-title">Resumen</span></div>
    <div id="resumen-content"></div>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showTab('maquinas',this)">
    <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
    Máquinas
  </button>
  <button class="nav-btn" onclick="showTab('intervenciones',this)">
    <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    Partes
  </button>
  <button class="nav-btn" onclick="showTab('resumen',this)">
    <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Resumen
  </button>
</nav>

<!-- MODAL MÁQUINA -->
<div class="ov" id="modal-maquina"><div class="modal">
  <div class="modal-handle"></div>
  <div class="modal-header">
    <span class="modal-title" id="maq-titulo">Nueva máquina</span>
    <button class="modal-close" onclick="cerrarModal('modal-maquina')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <label class="fl">Cliente</label>
  <select class="fi" id="m-cliente"><option value="">— seleccionar —</option></select>
  <label class="fl">Sede</label>
  <select class="fi" id="m-sede"><option value="">— seleccionar —</option></select>
  <label class="fl">Tipo de máquina</label>
  <div class="chip-row" id="chips-tipo">
    <button class="chip on" onclick="selChip(this,'tipo','Cabina pintura')">Cabina pintura</button>
    <button class="chip" onclick="selChip(this,'tipo','Elevador')">Elevador</button>
    <button class="chip" onclick="selChip(this,'tipo','Compresor')">Compresor</button>
    <button class="chip" onclick="selChip(this,'tipo','Soldadura')">Soldadura</button>
    <button class="chip" onclick="selChip(this,'tipo','Secador')">Secador</button>
    <button class="chip" onclick="selChip(this,'tipo','Otro')">Otro</button>
  </div>
  <label class="fl">ID / Código</label>
  <input class="fi" id="m-codigo" type="text" placeholder="ej. HVT-ILL-CAB-H1" autocapitalize="characters">
  <label class="fl">Marca / Modelo</label>
  <input class="fi" id="m-marca" type="text">
  <div class="row2">
    <div><label class="fl">Nº serie</label><input class="fi" id="m-serie" type="text"></div>
    <div><label class="fl">Año</label><input class="fi" id="m-anio" type="text" inputmode="numeric"></div>
  </div>
  <div id="extra-cabina">
    <label class="fl">Tipo arranque</label>
    <div class="chip-row" id="chips-arranque">
      <button class="chip on" onclick="selChip(this,'arranque','D-Y')">D-Y</button>
      <button class="chip" onclick="selChip(this,'arranque','Variador')">Variador</button>
      <button class="chip" onclick="selChip(this,'arranque','Directo')">Directo</button>
    </div>
    <div class="subsect">
      <div class="subsect-title">Motor impulsión</div>
      <label class="fl">Marca / modelo</label><input class="fi" id="m-imp-marca" type="text">
      <div class="row2">
        <div><label class="fl">kW</label><input class="fi" id="m-imp-kw" type="text" inputmode="decimal"></div>
        <div><label class="fl">rpm</label><input class="fi" id="m-imp-rpm" type="text" inputmode="numeric"></div>
      </div>
      <div class="row2">
        <div><label class="fl">Corriente (A)</label><input class="fi" id="m-imp-amp" type="text" inputmode="decimal"></div>
        <div><label class="fl">Cos φ</label><input class="fi" id="m-imp-cos" type="text" inputmode="decimal"></div>
      </div>
      <label class="fl">Rodamiento frontal</label><input class="fi" id="m-imp-rdf" type="text" autocapitalize="characters">
      <label class="fl">Rodamiento trasero</label><input class="fi" id="m-imp-rdt" type="text" autocapitalize="characters">
      <label class="fl">Referencia</label><input class="fi" id="m-imp-ref" type="text">
      <label class="fl">Nº serie</label><input class="fi" id="m-imp-ns" type="text">
    </div>
    <div class="subsect">
      <div class="subsect-title">Motor extracción</div>
      <label class="fl">Marca / modelo</label><input class="fi" id="m-ext-marca" type="text">
      <div class="row2">
        <div><label class="fl">kW</label><input class="fi" id="m-ext-kw" type="text" inputmode="decimal"></div>
        <div><label class="fl">rpm</label><input class="fi" id="m-ext-rpm" type="text" inputmode="numeric"></div>
      </div>
      <div class="row2">
        <div><label class="fl">Corriente (A)</label><input class="fi" id="m-ext-amp" type="text" inputmode="decimal"></div>
        <div><label class="fl">Cos φ</label><input class="fi" id="m-ext-cos" type="text" inputmode="decimal"></div>
      </div>
      <label class="fl">Rodamiento frontal</label><input class="fi" id="m-ext-rdf" type="text" autocapitalize="characters">
      <label class="fl">Rodamiento trasero</label><input class="fi" id="m-ext-rdt" type="text" autocapitalize="characters">
      <label class="fl">Referencia</label><input class="fi" id="m-ext-ref" type="text">
      <label class="fl">Nº serie</label><input class="fi" id="m-ext-ns" type="text">
    </div>
    <div class="subsect">
      <div class="subsect-title">Quemador</div>
      <label class="fl">Marca / modelo</label><input class="fi" id="m-que-marca" type="text">
      <label class="fl">Centralita</label><input class="fi" id="m-que-central" type="text">
      <label class="fl">Bomba</label><input class="fi" id="m-que-bomba" type="text">
      <div class="row2">
        <div><label class="fl">Chicle</label><input class="fi" id="m-que-chicle" type="text" placeholder="ej. 3,0×60°"></div>
        <div><label class="fl">Aire</label><input class="fi" id="m-que-aire" type="text"></div>
      </div>
    </div>
  </div>
  <label class="fl">Fotos</label>
  <div class="foto-grid" id="fotos-maq-grid"></div>
  <input type="file" id="foto-maq-in" accept="image/*" style="display:none" multiple onchange="addFotos('maq',event)">
  <label class="fl">Observaciones</label>
  <textarea class="fi" id="m-obs"></textarea>
  <button class="btn btn-p" onclick="guardarMaquina()">Guardar</button>
  <button class="btn btn-d" id="btn-elim-maq" style="display:none" onclick="eliminarMaquina()">Eliminar máquina</button>
  <button class="btn btn-g" onclick="cerrarModal('modal-maquina')">Cancelar</button>
</div></div>

<!-- MODAL INTERVENCIÓN -->
<div class="ov" id="modal-int"><div class="modal">
  <div class="modal-handle"></div>
  <div class="modal-header">
    <span class="modal-title">Nueva intervención</span>
    <button class="modal-close" onclick="cerrarModal('modal-int')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>

<script>

let visorCtx=null;
let pinBuffer='';

// ── PIN / BIOMETRÍA ───────────────────────────────────────────────────────────
const PIN_KEY='sf_pin', CRED_KEY='sf_cred';

async function initAuth(){
  const storedPin=localStorage.getItem(PIN_KEY);
  if(!storedPin){
    // Primera vez: modo setup
    document.getElementById('lock-sub').textContent='Crea tu PIN de 4 dígitos';
    document.getElementById('setup-hint').textContent='Este PIN protege tus datos';
    window._pinSetup=true;
    window._pinFirst=null;
  } else {
    document.getElementById('lock-sub').textContent='Introduce tu PIN';
    // Intentar Face ID si hay credencial guardada
    const hasCred=localStorage.getItem(CRED_KEY);
    if(hasCred && window.PublicKeyCredential){
      document.getElementById('btn-faceid').style.display='block';
      setTimeout(tryFaceID,400);
    }
  }
}

function pinKey(n){
  if(!n) return;
  if(pinBuffer.length>=4) return;
  pinBuffer+=n;
  updatePinDots();
  if(pinBuffer.length===4) setTimeout(checkPin,150);
}
function pinDel(){
  pinBuffer=pinBuffer.slice(0,-1);
  updatePinDots();
}
function updatePinDots(){
  for(let i=0;i<4;i++)
    document.getElementById('d'+i).classList.toggle('filled',i<pinBuffer.length);
}
function checkPin(){
  const storedPin=localStorage.getItem(PIN_KEY);
  if(window._pinSetup){
    if(!window._pinFirst){
      window._pinFirst=pinBuffer;
      pinBuffer='';
      updatePinDots();
      document.getElementById('lock-sub').textContent='Repite el PIN para confirmar';
      document.getElementById('lock-error').textContent='';
      return;
    }
    if(pinBuffer===window._pinFirst){
      localStorage.setItem(PIN_KEY,pinBuffer);
      pinBuffer=''; window._pinSetup=false; window._pinFirst=null;
      desbloquear();
      ofrecerBiometria();
    } else {
      document.getElementById('lock-error').textContent='Los PINs no coinciden. Inténtalo de nuevo.';
      pinBuffer=''; window._pinFirst=null;
      updatePinDots();
      document.getElementById('lock-sub').textContent='Crea tu PIN de 4 dígitos';
    }
    return;
  }
  if(pinBuffer===storedPin){
    desbloquear();
  } else {
    document.getElementById('lock-error').textContent='PIN incorrecto';
    pinBuffer=''; updatePinDots();
    setTimeout(()=>document.getElementById('lock-error').textContent='',1500);
  }
}
async function tryFaceID(){
  if(!window.PublicKeyCredential) return;
  try{
    const credIdB64=localStorage.getItem(CRED_KEY);
    if(!credIdB64){ await registrarBiometria(); return; }
    const credId=Uint8Array.from(atob(credIdB64),c=>c.charCodeAt(0));
    const assertion=await navigator.credentials.get({
      publicKey:{
        challenge:crypto.getRandomValues(new Uint8Array(32)),
        allowCredentials:[{type:'public-key',id:credId}],
        userVerification:'required',
        timeout:30000
      }
    });
    if(assertion) desbloquear();
  } catch(e){
    document.getElementById('lock-error').textContent='Face ID no disponible, usa el PIN';
    setTimeout(()=>document.getElementById('lock-error').textContent='',2000);
  }
}
async function ofrecerBiometria(){
  if(!window.PublicKeyCredential) return;
  const ok=confirm('¿Activar Face ID / Touch ID para acceder más rápido?');
  if(ok) await registrarBiometria();
}
async function registrarBiometria(){
  try{
    const cred=await navigator.credentials.create({
      publicKey:{
        challenge:crypto.getRandomValues(new Uint8Array(32)),
        rp:{name:'Sentinel Field',id:location.hostname},
        user:{id:new Uint8Array(16),name:'usuario',displayName:'Técnico'},
        pubKeyCredParams:[{alg:-7,type:'public-key'}],
        authenticatorSelection:{userVerification:'required'},
        timeout:30000
      }
    });
    const b64=btoa(String.fromCharCode(...new Uint8Array(cred.rawId)));
    localStorage.setItem(CRED_KEY,b64);
    document.getElementById('btn-faceid').style.display='block';
    document.getElementById('setup-hint').textContent='Face ID activado';
  } catch(e){}
}
function desbloquear(){
  authed=true;
  document.getElementById('lock-screen').classList.add('hidden');
  initDB().then(cargar);
}

// ── INDEXEDDB ─────────────────────────────────────────────────────────────────
function initDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open('SentinelField',4);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      ['maquinas','intervenciones','fotos','clientes','sedes'].forEach(s=>{
        if(!db.objectStoreNames.contains(s))
          db.createObjectStore(s,{keyPath:s==='fotos'?undefined:'id',autoIncrement:s==='fotos'});
      });
    };
    req.onsuccess=e=>{DB=e.target.result;res();};
    req.onerror=()=>rej(req.error);
  });
}
function dbAll(s){return new Promise((r,j)=>{const q=DB.transaction(s,'readonly').objectStore(s).getAll();q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error);})}
function dbPut(s,o){return new Promise((r,j)=>{const q=DB.transaction(s,'readwrite').objectStore(s).put(o);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error);})}
function dbDel(s,k){return new Promise((r,j)=>{const q=DB.transaction(s,'readwrite').objectStore(s).delete(k);q.onsuccess=()=>r();q.onerror=()=>j(q.error);})}
function dbWhere(s,f,v){return dbAll(s).then(a=>a.filter(r=>r[f]===v));}

async function cargar(){
  [clientes,sedes,maquinas,intervenciones]=await Promise.all([dbAll('clientes'),dbAll('sedes'),dbAll('maquinas'),dbAll('intervenciones')]);
  // Importar datos HVT si DB vacía
  if(clientes.length===0) await importarHVT();
  else { renderFiltros(); renderAll(); }
}

// ── FOTOS ─────────────────────────────────────────────────────────────────────
function comprimir(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height,mx=1200;
        if(w>mx||h>mx){if(w>h){h=Math.round(h*mx/w);w=mx;}else{w=Math.round(w*mx/h);h=mx;}}
        const c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        res(c.toDataURL('image/jpeg',0.78));
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}
async function addFotos(ctx,e){
  const files=Array.from(e.target.files);
  for(const f of files){
    const b64=await comprimir(f);
    fotosTemp[ctx].push(b64);
  }
  renderFotosTemp(ctx);
  e.target.value='';
}
function renderFotosTemp(ctx){
  const grid=document.getElementById('fotos-'+ctx+'-grid');
  const inputId='foto-'+ctx+'-in';
  let html=fotosTemp[ctx].map((b,i)=>`<img class="fthumb" src="${b}" onclick="abrirVisor({tipo:'temp',ctx:'${ctx}',idx:${i}})">`).join('');
  html+=`<div class="fadd" onclick="document.getElementById('${inputId}').click()"><svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>Foto</div>`;
  grid.innerHTML=html;
}
function abrirVisor(ctx){
  visorCtx=ctx;
  let src=ctx.tipo==='temp'?(ctx.ctx==='maq'?fotosTemp.maq[ctx.idx]:fotosTemp.int[ctx.idx]):ctx.src;
  document.getElementById('fv-img').src=src;
  document.getElementById('fviewer').classList.add('open');
}
function cerrarVisor(){document.getElementById('fviewer').classList.remove('open');visorCtx=null;}
async function eliminarFotoActual(){
  if(!visorCtx) return;
  if(visorCtx.tipo==='temp'){
    const arr=visorCtx.ctx==='maq'?fotosTemp.maq:fotosTemp.int;
    arr.splice(visorCtx.idx,1);
    renderFotosTemp(visorCtx.ctx);
  } else if(visorCtx.tipo==='db'){
    await dbDel('fotos',visorCtx.id);
    if(visorCtx.ctx==='maq') await renderFotosDet('maq',visorCtx.refId,'maqId');
    else await renderFotosDet('int',visorCtx.refId,'intTs');
  }
  cerrarVisor();
}
async function renderFotosDet(ctx,refId,field){
  const fotos=await dbWhere('fotos',field,refId);
  const cont=document.getElementById('fotos-det-'+ctx+'-'+refId);
  if(!cont) return;
  if(!fotos.length){cont.innerHTML='';return;}
  cont.innerHTML=`<div class="foto-grid">${fotos.map(f=>`<img class="fthumb" src="${f.data}" onclick="abrirVisor({tipo:'db',ctx:'${ctx}',refId:${JSON.stringify(refId)},id:${f.id},src:'${f.data}'})">`).join('')}</div>`;
}

function abrirModalMaquina(id){
  editMaqId=id||null;
  const m=id?maquinas.find(x=>x.id===id):null;
  document.getElementById('maq-titulo').textContent=m?'Editar máquina':'Nueva máquina';
  document.getElementById('btn-elim-maq').style.display=m?'block':'none';

  // Poblar selectores de cliente/sede
  const selCli=document.getElementById('m-cliente');
  selCli.innerHTML='<option value="">— seleccionar —</option>';
  clientes.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.nombre;selCli.appendChild(o);});
  selCli.onchange=()=>{
    const selSede=document.getElementById('m-sede');
    selSede.innerHTML='<option value="">— seleccionar —</option>';
    sedes.filter(s=>s.clienteId===selCli.value).forEach(s=>{const o=document.createElement('option');o.value=s.id;o.textContent=s.nombre;selSede.appendChild(o);});
  };
  if(m){selCli.value=m.clienteId;selCli.onchange();}

  const fs=['codigo','marca','serie','anio','obs',
    'imp-marca','imp-kw','imp-rpm','imp-amp','imp-cos','imp-rdf','imp-rdt','imp-ref','imp-ns',
    'ext-marca','ext-kw','ext-rpm','ext-amp','ext-cos','ext-rdf','ext-rdt','ext-ref','ext-ns',
    'que-marca','que-central','que-bomba','que-chicle','que-aire'];
  fs.forEach(f=>{
    const el=document.getElementById('m-'+f);if(!el)return;
    el.value=m?(getN(m,f)||''):'';
  });
  if(m){document.getElementById('m-sede').value=m.sedeId||'';}

  const tipo=m?m.tipo:'Cabina pintura';
  chips.tipo=tipo;
  document.getElementById('chips-tipo').querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.textContent.trim()===tipo));
  document.getElementById('extra-cabina').style.display=tipo==='Cabina pintura'?'block':'none';
  const arr=m?(m.arranque||'D-Y'):'D-Y';
  chips.arranque=arr;
  document.getElementById('chips-arranque').querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.textContent.trim()===arr));

  fotosTemp.maq=[];
  renderFotosTemp('maq');
  document.getElementById('modal-maquina').classList.add('open');
  document.getElementById('main').style.overflow='hidden';
}
function getN(m,f){
  if(f.startsWith('imp-'))return m.motImp?m.motImp[f.slice(4)]:'';
  if(f.startsWith('ext-'))return m.motExt?m.motExt[f.slice(4)]:'';
  if(f.startsWith('que-'))return m.quemador?m.quemador[f.slice(4)]:'';
  return m[f];
}
function v(id){return(document.getElementById(id)?.value||'').trim();}

async function guardarMaquina(){
  const cli=v('m-cliente'),sede=v('m-sede'),cod=v('m-codigo');
  if(!cli||!sede||!cod){alert('Cliente, sede y código son obligatorios');return;}
  const maq={id:cod,clienteId:cli,sedeId:sede,tipo:chips.tipo,marca:v('m-marca'),serie:v('m-serie'),anio:v('m-anio'),obs:v('m-obs'),fechaAlta:new Date().toISOString().slice(0,10)};
  if(chips.tipo==='Cabina pintura'){
    maq.arranque=chips.arranque;
    maq.motImp={marca:v('m-imp-marca'),kw:v('m-imp-kw'),rpm:v('m-imp-rpm'),amp:v('m-imp-amp'),cos:v('m-imp-cos'),rdf:v('m-imp-rdf'),rdt:v('m-imp-rdt'),ref:v('m-imp-ref'),ns:v('m-imp-ns')};
    maq.motExt={marca:v('m-ext-marca'),kw:v('m-ext-kw'),rpm:v('m-ext-rpm'),amp:v('m-ext-amp'),cos:v('m-ext-cos'),rdf:v('m-ext-rdf'),rdt:v('m-ext-rdt'),ref:v('m-ext-ref'),ns:v('m-ext-ns')};
    maq.quemador={marca:v('m-que-marca'),central:v('m-que-central'),bomba:v('m-que-bomba'),chicle:v('m-que-chicle'),aire:v('m-que-aire')};
  }
  await dbPut('maquinas',maq);
  for(const b of fotosTemp.maq) await dbPut('fotos',{maqId:cod,data:b,fecha:new Date().toISOString()});
  maquinas=await dbAll('maquinas');
  cerrarModal('modal-maquina');
  renderMaquinas();
}
async function eliminarMaquina(){
  if(!confirm('¿Eliminar '+editMaqId+'?'))return;
  await dbDel('maquinas',editMaqId);
  maquinas=await dbAll('maquinas');
  cerrarModal('modal-maquina');
  renderMaquinas();
}

    html+='<div class="sep">Motor impulsión</div>';
    html+=dr('Marca',m.motImp.marca)+dr('Referencia',m.motImp.ref);
    if(m.motImp.kw) html+=dr('Potencia/rpm',m.motImp.kw+' kW · '+m.motImp.rpm+' rpm');
    if(m.motImp.rdf) html+=dr('Rodamientos',m.motImp.rdf+' / '+m.motImp.rdt);
    html+=dr('Nº serie',m.motImp.ns);
  }
  if(m.quemador?.marca){
    html+='<div class="sep">Quemador</div>';
    html+=dr('Modelo',m.quemador.marca)+dr('Centralita',m.quemador.central)+dr('Bomba',m.quemador.bomba);
    if(m.quemador.chicle) html+=dr('Chicle/Aire',m.quemador.chicle+' · '+m.quemador.aire);
  }
  html+='<div class="sep">Fotos máquina</div><div id="fotos-det-maq-'+id+'"><p style="font-size:13px;color:var(--text3)">Cargando...</p></div>';
  const ints=intervenciones.filter(i=>i.maqId===id).sort((a,b)=>b.ts-a.ts);
  html+=`<div class="sep">Intervenciones (${ints.length})</div>`;
  if(!ints.length) html+='<p style="font-size:13px;color:var(--text3)">Sin intervenciones registradas.</p>';
  else ints.slice(0,12).forEach(i=>{
    const bd=i.tipo==='Correctivo'?'b-red':i.tipo==='Preventivo'?'b-green':'b-gray';
    html+=`<div class="ii">
      <div class="ii-meta">${i.fecha}${i.hinicio?' '+i.hinicio:''}${i.hfin?'–'+i.hfin:''} · <span class="badge ${bd}" style="font-size:10px;padding:1px 6px">${i.tipo}</span> · ${i.componente}</div>
      <div class="ii-desc">${i.desc}</div>
      ${i.materiales?`<div class="ii-mat">${i.materiales}</div>`:''}
      ${i.priv?`<div class="nota-priv"><div class="nota-priv-label">Nota privada</div>${i.priv}</div>`:''}
      <div id="fotos-det-int-${i.ts}"></div>
    </div>`;
  });
  if(m.obs) html+=`<p style="font-size:13px;color:var(--text2);margin-top:8px">${m.obs}</p>`;
  document.getElementById('det-body').innerHTML=html;
  document.getElementById('modal-detalle').classList.add('open');
  document.getElementById('main').style.overflow='hidden';
  await renderFotosDet('maq',id,'maqId');
  for(const i of ints.slice(0,12)) await renderFotosDet('int',i.ts,'intTs');
}
function editarDesdeDet(){cerrarModal('modal-detalle');abrirModalMaquina(detMaqId);}
function nuevaIntDesdeDet(){cerrarModal('modal-detalle');abrirModalIntervencion(detMaqId);}

// ── CERRAR MODAL ──────────────────────────────────────────────────────────────
function cerrarModal(id){
  document.getElementById(id).classList.remove('open');
  document.getElementById('main').style.overflow='';
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderMaquinas(){
  const cont=document.getElementById('lista-maquinas');
  const filtCli=document.getElementById('filtro-cliente').value;
  const filtTipo=document.getElementById('filtro-tipo').value;
  let lista=maquinas;
  if(filtCli) lista=lista.filter(m=>m.clienteId===filtCli);
  if(filtTipo) lista=lista.filter(m=>m.tipo===filtTipo);
  if(!lista.length){
    cont.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg><p>Sin máquinas. Pulsa "+ Nueva" para añadir.</p></div>`;
    return;
  }
  const porSede={};
  lista.forEach(m=>{if(!porSede[m.sedeId])porSede[m.sedeId]=[];porSede[m.sedeId].push(m);});
  let html='';
  Object.entries(porSede).forEach(([sedeId,items])=>{
    const s=sedes.find(x=>x.id===sedeId);
    html+=`<div class="taller-label">${s?s.nombre:sedeId}</div>`;
    items.forEach(m=>{
      const ints=intervenciones.filter(i=>i.maqId===m.id);
      const last=[...ints].sort((a,b)=>b.ts-a.ts)[0];
      const tb=m.tipo==='Cabina pintura'?'b-amber':m.tipo==='Elevador'?'b-blue':m.tipo==='Compresor'?'b-green':'b-gray';
      html+=`<div class="card" onclick="abrirDetalle('${m.id}')">
        <div class="card-top">
          <div><div class="card-id">${m.id}</div><div class="card-meta">${m.marca||''}${m.modelo?' '+m.modelo:''}${m.arranque?' · '+m.arranque:''}</div></div>
          <span class="badge ${tb}">${m.tipo}</span>
        </div>
        <div style="font-size:12px;color:var(--text3);margin-top:6px">${ints.length} partes${last?' · último '+last.fecha:''}</div>
      </div>`;
    });
  });
  cont.innerHTML=html;
}

function renderIntervenciones(){
  const cont=document.getElementById('lista-intervenciones');
  if(!intervenciones.length){
    cont.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg><p>Sin partes registradas.</p></div>`;
    return;
  }
  const sorted=[...intervenciones].sort((a,b)=>b.ts-a.ts);
  let html='';
  sorted.forEach(i=>{
    const m=maquinas.find(x=>x.id===i.maqId);
    const s=m?sedes.find(x=>x.id===m.sedeId):null;
    const bd=i.tipo==='Correctivo'?'b-red':i.tipo==='Preventivo'?'b-green':i.tipo==='Inspección'?'b-blue':'b-gray';
    html+=`<div class="card" style="cursor:default">
      <div class="card-top">
        <div><div class="card-id">${i.maqId}</div><div class="card-meta">${s?s.nombre.replace('HVT ',''):''} · ${i.componente}${i.hinicio?' · '+i.hinicio:''}${i.hfin?'–'+i.hfin:''}</div></div>
        <div style="text-align:right"><span class="badge ${bd}">${i.tipo}</span><div style="font-size:11px;color:var(--text3);margin-top:4px">${i.fecha}</div></div>
      </div>
      <div style="font-size:14px;margin-top:6px;line-height:1.4">${i.desc}</div>
      ${i.materiales?`<div style="font-size:12px;color:var(--text3);margin-top:4px">${i.materiales}</div>`:''}
      ${i.priv?`<div class="nota-priv"><div class="nota-priv-label">Nota privada</div>${i.priv}</div>`:''}
    </div>`;
  });
  cont.innerHTML=html;
}

function renderResumen(){
  const nMaq=maquinas.length,nInt=intervenciones.length;
  const nCorr=intervenciones.filter(i=>i.tipo==='Correctivo').length;
  const nPrev=intervenciones.filter(i=>i.tipo==='Preventivo').length;
  const hTotal=intervenciones.reduce((s,i)=>{
    if(i.hinicio&&i.hfin){
      const [h1,m1]=i.hinicio.split(':').map(Number);
      const [h2,m2]=i.hfin.split(':').map(Number);
      return s+Math.max(0,(h2*60+m2-h1*60-m1)/60);
    }
    return s;
  },0);
  const recientes=[...intervenciones].sort((a,b)=>b.ts-a.ts).slice(0,5);
  document.getElementById('resumen-content').innerHTML=`
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num">${nMaq}</div><div class="stat-lbl">Máquinas</div></div>
    <div class="stat-card"><div class="stat-num">${nInt}</div><div class="stat-lbl">Partes</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--red)">${nCorr}</div><div class="stat-lbl">Correctivos</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--green)">${nPrev}</div><div class="stat-lbl">Preventivos</div></div>
  </div>
  <div class="stat-card" style="margin-bottom:16px">
    <div class="stat-num" style="color:var(--accent)">${hTotal.toFixed(1)}</div>
    <div class="stat-lbl">Horas registradas (con hora inicio/fin)</div>
  </div>
  <div class="sync-row"><div class="sync-dot ${navigator.onLine?'':'off'}"></div><span>${navigator.onLine?'En línea':'Sin conexión — datos guardados localmente'}</span></div>
  <div style="margin-top:16px">
    <div class="sep">Últimas intervenciones</div>
    ${recientes.map(i=>`<div class="ii"><div class="ii-meta">${i.fecha} · ${i.maqId} · ${i.componente}</div><div class="ii-desc">${i.desc}</div></div>`).join('')}
  </div>
  <button class="btn btn-g" style="margin-top:16px" onclick="exportarJSON()">Exportar JSON</button>
  <button class="btn btn-g" onclick="importarJSON()">Importar JSON</button>`;
}

function renderAll(){renderMaquinas();renderIntervenciones();}

// ── EXPORTAR / IMPORTAR ───────────────────────────────────────────────────────
function exportarJSON(){
  const data={version:'1.1',exportado:new Date().toISOString(),clientes,sedes,maquinas,intervenciones};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='sentinel_field_'+new Date().toISOString().slice(0,10)+'.json';a.click();
  URL.revokeObjectURL(url);
}
function importarJSON(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=async e=>{
    const f=e.target.files[0];if(!f)return;
    const txt=await f.text();
    try{
      const data=JSON.parse(txt);
      if(data.clientes)for(const c of data.clientes) await dbPut('clientes',c);
      if(data.sedes)for(const s of data.sedes) await dbPut('sedes',s);
      if(data.maquinas)for(const m of data.maquinas) await dbPut('maquinas',m);
      if(data.intervenciones)for(const i of data.intervenciones) await dbPut('intervenciones',i);
      [clientes,sedes,maquinas,intervenciones]=await Promise.all([dbAll('clientes'),dbAll('sedes'),dbAll('maquinas'),dbAll('intervenciones')]);
      renderFiltros();renderAll();
      alert('Datos importados correctamente.');
    }catch(err){alert('Error al importar: '+err.message);}
  };
  inp.click();
}

// ── OFFLINE ───────────────────────────────────────────────────────────────────
window.addEventListener('online',()=>document.getElementById('offline-bar').classList.remove('show'));
window.addEventListener('offline',()=>document.getElementById('offline-bar').classList.add('show'));
if(!navigator.onLine) document.getElementById('offline-bar').classList.add('show');

if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});

// ── INICIO ────────────────────────────────────────────────────────────────────
initAuth();
</script>
